version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: finguard-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: finguard
      MONGO_INITDB_ROOT_PASSWORD: finguard_secret
      MONGO_INITDB_DATABASE: finguard_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - finguard-net

  redis:
    image: redis:7-alpine
    container_name: finguard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - finguard-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finguard-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://finguard:finguard_secret@mongodb:27017/finguard_db?authSource=admin
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - model_data:/app/ml_models
    depends_on:
      - mongodb
      - redis
    networks:
      - finguard-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finguard-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - finguard-net

volumes:
  mongo_data:
  model_data:

networks:
  finguard-net:
    driver: bridge
